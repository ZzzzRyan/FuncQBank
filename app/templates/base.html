<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      var mode = localStorage.getItem("theme-mode") || "system";
      var dark = mode === "dark" || (mode === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.dataset.themeMode = mode;
      document.documentElement.dataset.theme = dark ? "dark" : "light";
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
  <link rel="stylesheet" href="/static/app.css?v={{ asset_v }}">
</head>
<body>
{% set path = request.url.path %}
{% block chrome %}
<header class="topbar"><div class="wrap">
  <a class="brand" href="/"><span class="glyph"></span>{{ app_name }}</a>
  {% if user %}
  <nav class="nav">
    <div class="nav-scroll">
      <a href="/" class="{{ 'active' if path == '/' }}">题库</a>
      <a href="/exam" class="{{ 'active' if path.startswith('/exam') }}">考试</a>
      <a href="/practice/wrong" class="{{ 'active' if path == '/practice/wrong' }}">错题本</a>
      <a href="/search" class="{{ 'active' if path == '/search' }}">搜索</a>
      {% if user.role == 'admin' %}<a href="/admin" class="{{ 'active' if path.startswith('/admin') }}">后台</a>{% endif %}
      <a class="gh-link" href="https://github.com/ZzzzRyan/FuncQBank" target="_blank" rel="noopener" title="GitHub" aria-label="GitHub"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg></a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换主题" title="切换主题"></button>
    </div>
    <div class="usermenu" id="usermenu">
      <button class="who" id="usermenu-btn" type="button" aria-haspopup="true" aria-expanded="false">
        {{ user.display_name }}<span class="caret" aria-hidden="true"></span>
      </button>
      <div class="usermenu-pop" id="usermenu-pop" role="menu">
        <form method="post" action="/logout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button class="usermenu-item" type="submit" role="menuitem">退出登录</button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}
</div></header>
{% endblock %}

<main>{% block body %}{% endblock %}</main>
{% block footer %}{% endblock %}

<script src="/static/vendor/katex/katex.min.js" defer></script>
<script src="/static/vendor/katex/contrib/auto-render.min.js" defer></script>
<script src="/static/app.js?v={{ asset_v }}" defer></script>
{% block scripts %}{% endblock %}
</body>
</html>
