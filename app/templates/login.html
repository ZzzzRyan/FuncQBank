{% extends "base.html" %}
{% block chrome %}{% endblock %}
{% block title %}登录 · {{ app_name }}{% endblock %}
{% block body %}
<div class="auth-wrap"><div class="auth-card sheet">
  <div class="brand"><span class="glyph"></span>{{ app_name }}</div>
  <div class="tag">泛函分析 · 考前刷题与记忆</div>
  {% if error %}<div class="alert err">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="field"><label>用户名</label><input type="text" name="username" autocomplete="username" autofocus required></div>
    <div class="field"><label>密码</label><input type="password" name="password" autocomplete="current-password" required></div>
    <button class="btn btn-primary btn-block" type="submit">登录</button>
  </form>
  {% if registration_open %}<p class="tag" style="margin-top:18px">还没有账号？<a href="/register">注册一个</a></p>{% endif %}
</div></div>
{% endblock %}
