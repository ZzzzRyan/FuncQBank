{# Shared practice runner — included by practice.html and search.html.
   Requires: count, questions_json, states_json in context. #}
<div class="practice-tools">
  <a class="btn btn-sm" href="/">← 返回主页</a>
</div>

<div class="progress-line">
  <span id="answered" class="progress-main">已答 0 / {{ count }}</span>
  <div class="bar"><i id="progbar" style="width:0%"></i></div>
  <span id="pos" class="pos">第 1 题</span>
  <span id="wrongcount" class="wrongcount">本次错 0</span>
  <button class="btn btn-sm" id="btn-grid" type="button">答题卡</button>
</div>

<div class="sheet qsheet" id="qsheet"></div>
<template id="section-summary-template">
  <div class="section-summary">
    <div class="summary-kicker">本节小结</div>
    <h2 data-summary="title"></h2>
    <p class="summary-lead" data-summary="lead"></p>
    <div class="summary-stats">
      <div class="summary-stat">
        <span class="n" data-summary="done"></span>
        <span class="k">已完成</span>
        <span class="s" data-summary="total"></span>
      </div>
      <div class="summary-stat wrong">
        <span class="n" data-summary="wrong"></span>
        <span class="k">本次错</span>
        <span class="s">需要回看</span>
      </div>
      <div class="summary-stat new-wrong">
        <span class="n" data-summary="new-wrong"></span>
        <span class="k">新错题</span>
        <span class="s">这次新增</span>
      </div>
      <div class="summary-stat improved">
        <span class="n" data-summary="improved"></span>
        <span class="k">有进步</span>
        <span class="s">掌握更稳</span>
      </div>
    </div>
    <div class="summary-bar"><i data-summary="bar" style="width:0%"></i></div>
    <div class="actions summary-actions">
      <button class="btn" id="summary-review" type="button">回看本节</button>
      <a class="btn btn-primary" data-summary="next" href="/">下一节 →</a>
    </div>
  </div>
</template>
<div class="gridnav hidden" id="gridnav"></div>

<div class="qnav">
  <button class="btn" id="btn-prev" type="button">← 上一题</button>
  <span class="muted sans" id="kbd-hint" style="font-size:.78rem">← → 切题 · 数字键选择 · 回车揭示</span>
  <button class="btn" id="btn-next" type="button">下一题 →</button>
</div>

<script id="qdata" type="application/json">{{ questions_json|safe }}</script>
<script id="sdata" type="application/json">{{ states_json|safe }}</script>
<script id="pdata" type="application/json">{"is_wrong_book": {{ 'true' if path == '/practice/wrong' else 'false' }}, "master_threshold": {{ master_threshold|default(2) }}, "next_scope_url": {{ (next_scope_url or '')|tojson }}, "completion_enabled": {{ 'true' if completion_enabled|default(false) else 'false' }} }</script>
