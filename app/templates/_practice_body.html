{# Shared practice runner — included by practice.html and search.html.
   Requires: count, questions_json, states_json in context. #}
<div class="progress-line">
  <span id="pos">1 / {{ count }}</span>
  <div class="bar"><i id="progbar" style="width:0%"></i></div>
  <span id="answered">已答 0</span>
  <button class="btn btn-sm" id="btn-shuffle" type="button">乱序</button>
  <button class="btn btn-sm" id="btn-grid" type="button">答题卡</button>
</div>

<div class="sheet qsheet" id="qsheet"></div>
<div class="gridnav hidden" id="gridnav"></div>

<div class="qnav">
  <button class="btn" id="btn-prev" type="button">← 上一题</button>
  <span class="muted sans" id="kbd-hint" style="font-size:.78rem">← → 切题 · 数字键选择 · 回车揭示</span>
  <button class="btn" id="btn-next" type="button">下一题 →</button>
</div>

<script id="qdata" type="application/json">{{ questions_json|safe }}</script>
<script id="sdata" type="application/json">{{ states_json|safe }}</script>
